[firewall]
# Enable/disable fwsec (1 = enabled, 0 = disabled)
ENABLED = 1

# Inbound TCP ports allowed (comma separated, ranges supported: 8000:8080)
TCP_IN = 1157

# Outbound TCP ports allowed
TCP_OUT = 80,443,53,25,587,993,995,1157

# Inbound UDP ports allowed
UDP_IN = 53

# Outbound UDP ports allowed
UDP_OUT = 53,123

# Allow ICMP (ping) inbound
ICMP_IN = 1

# Enable IPv6 support
IPV6 = 1

# Max temporary IP blocks tracked
DENY_TEMP_IP_LIMIT = 100

# Max permanent IP blocks in deny list
DENY_IP_LIMIT = 1000

[containers]
# Container runtime compatibility mode (Docker / Podman / nerdctl).
# 1 = keep the forward chain permissive so container networking works and
#     apply fwsec allow/deny + CrowdSec bans to forwarded (container) traffic.
# 0 = no containers on this host; the forward chain drops everything.
# Set automatically by the installer when a runtime is detected.
CONTAINER_MODE = 0

# Policy for published container ports (-p 80:80 etc.):
#   open     = published ports accept traffic from any source (Docker default)
#   filtered = published ports only accept traffic from the fwsec allow list
CONTAINER_POLICY = open

[crowdsec]
# Enable CrowdSec integration
ENABLED = 1

# CrowdSec Local API URL
API_URL = http://127.0.0.1:8080

# Sync fwsec -d bans to CrowdSec decisions as well
SYNC_DENY = 1

[logging]
LOG_FILE = /var/log/fwsec.log
LOG_LEVEL = INFO
